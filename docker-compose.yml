services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      # Random-ish host port (from .env) mapped to Mongo's internal 27017,
      # so it won't clash with a local mongod.
      - "${MONGO_HOST_PORT:-37017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Force the app to reach Mongo via the compose service name.
      MONGO_URL: mongodb://mongo:27017
    ports:
      - "${GATEWAY_PORT:-8787}:${GATEWAY_PORT:-8787}"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
